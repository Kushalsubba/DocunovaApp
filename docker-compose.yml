services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: doc_scanner
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d doc_scanner"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -v '\"status\":\"red\"'"]
      interval: 20s
      timeout: 10s
      retries: 10

  ollama:
    image: ollama/ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/doc_scanner
      ELASTICSEARCH_URL: http://elasticsearch:9200
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:latest}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic-embed-text:latest}
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production}
      MILVUS_DB_PATH: /data/milvus_kush.db
      UPLOAD_DIR: /data/uploads
      SCAN_DIRECTORY: /data/documents
    volumes:
      - backend_data:/data
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""
    ports:
      - "8002:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  es_data:
  ollama_data:
  backend_data:
